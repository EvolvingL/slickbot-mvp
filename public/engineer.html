<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gloria — Engineer Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --obsidian:#0a0a0a;--charcoal:#141414;--graphite:#1e1e1e;--pewter:#2a2a2a;
  --iron:#3d3d3d;--ash:#5a5a5a;--silver:#8a8a8a;--pearl:#e8e4df;--ivory:#f5f2ee;
  --white:#fdfcfb;--gold:#c9a96e;--gold-light:#e2c99a;--gold-dark:#a07840;
  --green:#3d7a5e;--green-bg:rgba(61,122,94,.1);--red:#8b3a3a;--amber:#8a6a2e;
  --chat-border:#e4e0da;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--sans);font-size:14px;background:var(--ivory);color:var(--obsidian);}

/* ── Login ── */
#login-screen{
  position:fixed;inset:0;background:var(--obsidian);
  display:flex;align-items:center;justify-content:center;z-index:100;
  background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,169,110,.07) 0%,transparent 65%);
}
.login-card{
  width:340px;background:var(--charcoal);border:1px solid var(--pewter);
  border-radius:4px;padding:44px 40px;
}
.login-eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;font-weight:500;}
.login-title{font-family:var(--serif);font-size:28px;font-weight:300;color:var(--white);margin-bottom:6px;}
.login-sub{font-size:11px;color:var(--silver);margin-bottom:28px;line-height:1.7;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--silver);margin-bottom:6px;font-weight:500;}
.inp{
  width:100%;padding:10px 14px;background:var(--graphite);border:1px solid var(--iron);
  border-radius:4px;color:var(--pearl);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--gold);}
.login-err{font-size:11px;color:#c07070;margin-top:8px;display:none;}
.btn-login{
  width:100%;margin-top:6px;padding:11px;background:var(--gold);border:none;border-radius:4px;
  color:var(--obsidian);font-family:var(--sans);font-size:13px;font-weight:600;
  letter-spacing:.5px;cursor:pointer;transition:background .15s;
}
.btn-login:hover{background:var(--gold-light);}

/* ── Main app ── */
#app{display:none;flex-direction:column;height:100%;}

.eng-header{
  background:var(--obsidian);padding:0 20px;height:52px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  border-bottom:1px solid var(--pewter);
}
.eng-wordmark{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--white);letter-spacing:2px;}
.eng-wordmark em{color:var(--gold);font-style:normal;}
.eng-name{font-size:11px;color:var(--silver);letter-spacing:1px;margin-left:auto;}
.eng-logout{background:none;border:none;color:var(--ash);font-size:11px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:color .15s;}
.eng-logout:hover{color:var(--pearl);}

/* Tab bar */
.eng-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--chat-border);flex-shrink:0;}
.eng-tab{
  flex:1;padding:12px 8px;text-align:center;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;font-weight:500;color:var(--silver);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;
}
.eng-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.eng-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.eng-pane{display:none;flex:1;overflow-y:auto;padding:16px;}
.eng-pane.active{display:block;}

/* Job cards */
.job-card{
  background:var(--white);border:1px solid var(--chat-border);border-radius:6px;
  margin-bottom:12px;overflow:hidden;
}
.job-card-head{
  padding:14px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--chat-border);
}
.job-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-assigned{background:#c9a96e;}
.dot-accepted{background:#3d7a5e;}
.dot-en_route{background:#3b82f6;}
.dot-on_site{background:#8b5cf6;}
.dot-completed{background:#6b7280;}
.dot-cancelled{background:#8b3a3a;}

.job-customer{font-weight:500;font-size:14px;color:var(--obsidian);}
.job-service{font-size:11px;color:var(--silver);margin-top:1px;}
.job-date-badge{
  margin-left:auto;font-size:10px;font-weight:500;
  background:var(--ivory);border:1px solid var(--chat-border);
  border-radius:12px;padding:3px 10px;color:var(--ash);white-space:nowrap;
}
.job-today .job-date-badge{background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.3);color:var(--gold-dark);}

.job-card-body{padding:12px 16px;display:flex;flex-direction:column;gap:6px;}
.job-detail{font-size:12px;color:var(--ash);display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.job-detail-icon{flex-shrink:0;width:14px;text-align:center;margin-top:1px;}

.job-actions{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--chat-border);background:var(--ivory);}
.btn-action{
  flex:1;min-width:100px;padding:8px 10px;border-radius:4px;border:none;
  font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.5px;
  cursor:pointer;transition:all .15s;text-align:center;
}
.btn-accept{background:var(--green);color:var(--white);}
.btn-accept:hover{background:#2d6a4e;}
.btn-route{background:#3b82f6;color:var(--white);}
.btn-route:hover{background:#2563eb;}
.btn-onsite{background:#8b5cf6;color:var(--white);}
.btn-onsite:hover{background:#7c3aed;}
.btn-complete{background:var(--obsidian);color:var(--pearl);}
.btn-complete:hover{background:var(--charcoal);}
.btn-nav{background:var(--ivory);color:var(--obsidian);border:1px solid var(--chat-border);}
.btn-nav:hover{background:var(--chat-border);}

/* Status label */
.status-label{
  display:inline-block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 8px;border-radius:10px;font-weight:600;
}
.sl-assigned{background:rgba(201,169,110,.12);color:var(--gold-dark);border:1px solid rgba(201,169,110,.3);}
.sl-accepted{background:var(--green-bg);color:var(--green);border:1px solid rgba(61,122,94,.3);}
.sl-en_route{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.3);}
.sl-on_site{background:rgba(139,92,246,.1);color:#8b5cf6;border:1px solid rgba(139,92,246,.3);}
.sl-completed{background:var(--ivory);color:var(--silver);border:1px solid var(--chat-border);}
.sl-cancelled{background:rgba(139,58,58,.1);color:#c07070;border:1px solid rgba(139,58,58,.3);}

/* Map pane */
#map-pane{padding:0;position:relative;}
#eng-map{width:100%;height:100%;min-height:400px;}
.map-legend{
  position:absolute;bottom:12px;left:12px;z-index:999;
  background:var(--white);border:1px solid var(--chat-border);border-radius:6px;
  padding:8px 12px;font-size:11px;color:var(--ash);line-height:2;
}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--silver);font-family:var(--serif);font-size:15px;font-style:italic;line-height:2;}

/* Toast */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--obsidian);color:var(--pearl);font-size:12px;
  padding:8px 20px;border-radius:20px;display:none;z-index:999;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-eyebrow">Engineer Portal</div>
    <div class="login-title">G<em style="color:var(--gold);font-style:normal">loria</em></div>
    <div class="login-sub">Sign in to view your assigned jobs and manage your schedule.</div>
    <div class="fld"><label>Engineer ID</label><input class="inp" type="text" id="login-id" placeholder="Your engineer ID" autocomplete="username"></div>
    <div class="fld"><label>Password</label><input class="inp" type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="login-err">Invalid credentials. Check with your manager.</div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="eng-header">
    <div class="eng-wordmark">G<em>loria</em></div>
    <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ash);">Engineer Portal</span>
    <div class="eng-name" id="eng-name"></div>
    <button class="eng-logout" onclick="logout()">Sign out</button>
  </div>

  <div class="eng-tabs">
    <button class="eng-tab active" id="tab-upcoming" onclick="showPane('upcoming')">Upcoming</button>
    <button class="eng-tab" id="tab-today" onclick="showPane('today')">Today</button>
    <button class="eng-tab" id="tab-map" onclick="showPane('map')">Map</button>
    <button class="eng-tab" id="tab-history" onclick="showPane('history')">History</button>
  </div>

  <div class="eng-content">
    <div class="eng-pane active" id="pane-upcoming"></div>
    <div class="eng-pane" id="pane-today"></div>
    <div class="eng-pane" id="pane-map" style="padding:0;flex:1;">
      <div id="eng-map"></div>
      <div class="map-legend">
        <div><span class="legend-dot" style="background:#c9a96e"></span>Your base</div>
        <div><span class="legend-dot" style="background:#3d7a5e"></span>Today's jobs</div>
        <div><span class="legend-dot" style="background:#3b82f6"></span>Upcoming jobs</div>
      </div>
    </div>
    <div class="eng-pane" id="pane-history"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let authToken = null;
let engineerData = null;
let allJobs = [];
let engMap = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const engineerId = document.getElementById('login-id').value.trim();
  const password   = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';

  try {
    const r = await fetch('/api/engineer/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ engineerId, password }),
    });
    const d = await r.json();
    if (!d.ok) { errEl.style.display = 'block'; return; }
    authToken = d.token;
    document.getElementById('eng-name').textContent = d.name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    sessionStorage.setItem('eng_token', authToken);
    sessionStorage.setItem('eng_name', d.name);
    loadJobs();
  } catch {
    errEl.style.display = 'block';
  }
}

function logout() {
  sessionStorage.clear();
  authToken = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── Jobs ──────────────────────────────────────────────────────────────────────
async function loadJobs() {
  const r = await fetch('/api/engineer/jobs', { headers: { 'Authorization': 'Bearer ' + authToken } });
  const d = await r.json();
  allJobs = d.jobs || [];
  renderPanes();
  if (engMap) renderMap();
}

function renderPanes() {
  const today = new Date().toISOString().split('T')[0];
  const upcoming = allJobs.filter(j => j.date >= today && !['completed','cancelled'].includes(j.triageStatus));
  const todayJobs = upcoming.filter(j => j.date === today);
  const history   = allJobs.filter(j => j.triageStatus === 'completed' || (j.date < today));

  document.getElementById('pane-upcoming').innerHTML = upcoming.length
    ? upcoming.map(j => jobCard(j, today)).join('')
    : '<div class="empty">No upcoming jobs.</div>';

  document.getElementById('pane-today').innerHTML = todayJobs.length
    ? todayJobs.map(j => jobCard(j, today)).join('')
    : '<div class="empty">Nothing scheduled for today.</div>';

  document.getElementById('pane-history').innerHTML = history.length
    ? history.map(j => jobCard(j, today)).join('')
    : '<div class="empty">No completed jobs yet.</div>';
}

function jobCard(j, today) {
  const isToday = j.date === today;
  const status  = j.triageStatus || 'assigned';
  const statusLabel = { assigned:'Assigned', accepted:'Accepted', en_route:'En Route', on_site:'On Site', completed:'Completed', cancelled:'Cancelled' }[status] || status;

  const actions = buildActions(j, status);
  const mapsUrl = j.address ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(j.address)}` : null;

  return `<div class="job-card ${isToday?'job-today':''}">
    <div class="job-card-head">
      <div class="job-status-dot dot-${status}"></div>
      <div>
        <div class="job-customer">${esc(j.name)}</div>
        <div class="job-service">${esc(j.service||'General job')}</div>
      </div>
      <div class="job-date-badge">${esc(j.date)}${j.time?' · '+esc(j.time):''}</div>
    </div>
    <div class="job-card-body">
      <div style="margin-bottom:4px"><span class="status-label sl-${status}">${statusLabel}</span></div>
      ${j.phone?`<div class="job-detail"><span class="job-detail-icon">📞</span><a href="tel:${esc(j.phone)}" style="color:var(--gold)">${esc(j.phone)}</a></div>`:''}
      ${j.email?`<div class="job-detail"><span class="job-detail-icon">✉</span>${esc(j.email)}</div>`:''}
      ${j.address?`<div class="job-detail"><span class="job-detail-icon">📍</span>${esc(j.address)}</div>`:''}
      ${j.notes?`<div class="job-detail"><span class="job-detail-icon">📝</span>${esc(j.notes)}</div>`:''}
    </div>
    ${actions || mapsUrl ? `<div class="job-actions">
      ${actions}
      ${mapsUrl?`<button class="btn-action btn-nav" onclick="window.open('${mapsUrl}','_blank')">Navigate</button>`:''}
    </div>` : ''}
  </div>`;
}

function buildActions(j, status) {
  const id = j.id;
  if (status === 'assigned')  return `<button class="btn-action btn-accept" onclick="updateStatus('${id}','accepted')">Accept Job</button>`;
  if (status === 'accepted')  return `<button class="btn-action btn-route"  onclick="updateStatus('${id}','en_route')">I'm On My Way</button>`;
  if (status === 'en_route')  return `<button class="btn-action btn-onsite" onclick="updateStatus('${id}','on_site')">I've Arrived</button>`;
  if (status === 'on_site')   return `<button class="btn-action btn-complete" onclick="updateStatus('${id}','completed')">Mark Complete</button>`;
  return '';
}

async function updateStatus(jobId, status) {
  const token = authToken;
  const engineerId = atob(token).split(':')[0];
  const r = await fetch(`/api/booking/${jobId}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status, engineerId }),
  });
  if (r.ok) { showToast(statusToast(status)); loadJobs(); }
  else showToast('Could not update — try again');
}

function statusToast(s) {
  return { accepted:'Job accepted', en_route:'On your way — safe travels', on_site:'Marked as on site', completed:'Job complete — great work' }[s] || 'Updated';
}

// ── Map ───────────────────────────────────────────────────────────────────────
function showPane(name) {
  document.querySelectorAll('.eng-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.eng-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');

  if (name === 'map') {
    if (!engMap) {
      setTimeout(() => {
        engMap = L.map('eng-map').setView([51.5, -0.1], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors'
        }).addTo(engMap);
        renderMap();
      }, 50);
    } else {
      engMap.invalidateSize();
      renderMap();
    }
  }
}

function renderMap() {
  if (!engMap) return;
  engMap.eachLayer(l => { if (l instanceof L.Marker || l instanceof L.Polyline) engMap.removeLayer(l); });

  const today = new Date().toISOString().split('T')[0];
  const bounds = [];

  allJobs.forEach(j => {
    if (!j.jobCoords) return;
    const { lat, lng } = j.jobCoords;
    const isToday = j.date === today;
    const color = isToday ? '#3d7a5e' : '#3b82f6';
    const marker = L.circleMarker([lat, lng], {
      radius: 8, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.9
    }).addTo(engMap);
    marker.bindPopup(`<strong>${j.name}</strong><br>${j.service||''}<br>${j.date}${j.time?' · '+j.time:''}<br>${j.address||''}`);
    bounds.push([lat, lng]);
  });

  if (bounds.length) engMap.fitBounds(bounds, { padding: [40, 40] });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(function init() {
  // Check URL params (from SMS link)
  const params = new URLSearchParams(location.search);
  const idParam = params.get('id');
  if (idParam) document.getElementById('login-id').value = idParam;

  // Restore session
  const saved = sessionStorage.getItem('eng_token');
  const savedName = sessionStorage.getItem('eng_name');
  if (saved) {
    authToken = saved;
    document.getElementById('eng-name').textContent = savedName || '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadJobs();
  }
})();
</script>
</body>
</html>
