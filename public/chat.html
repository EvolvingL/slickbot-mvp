<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gloria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --obsidian:#0a0a0a;--charcoal:#141414;--graphite:#1e1e1e;--pewter:#2a2a2a;
  --iron:#3d3d3d;--ash:#5a5a5a;--silver:#8a8a8a;--pearl:#e8e4df;--ivory:#f5f2ee;
  --white:#fdfcfb;--gold:#c9a96e;--gold-light:#e2c99a;--green:#3d7a5e;
  --chat-bg:#faf9f7;--chat-border:#e4e0da;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);font-size:13px;}
body{display:flex;flex-direction:column;background:var(--chat-bg);}

/* Header */
.chat-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--obsidian);
  border-bottom:1px solid var(--pewter);flex-shrink:0;
}
.chat-header-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark,#a07840));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:15px;font-weight:300;color:var(--obsidian);
}
.chat-header-name{font-family:var(--serif);font-size:16px;font-weight:300;color:var(--white);letter-spacing:1px;}
.chat-header-sub{font-size:10px;color:var(--silver);letter-spacing:.5px;}
.chat-header-close{
  margin-left:auto;width:28px;height:28px;border-radius:50%;
  background:var(--graphite);border:1px solid var(--iron);
  color:var(--silver);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;line-height:1;transition:all .15s;
}
.chat-header-close:hover{background:var(--pewter);color:var(--pearl);}

/* Messages */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--chat-border);}

.msg{display:flex;gap:8px;align-items:flex-end;max-width:88%;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}

.msg-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),#a07840);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:12px;color:var(--obsidian);
}
.msg-bubble{
  padding:9px 13px;border-radius:14px;
  font-size:13px;line-height:1.55;word-wrap:break-word;
}
.msg.bot .msg-bubble{
  background:var(--white);border:1px solid var(--chat-border);
  color:var(--obsidian);border-bottom-left-radius:4px;
}
.msg.user .msg-bubble{
  background:var(--obsidian);color:var(--pearl);
  border-bottom-right-radius:4px;
}

/* Typing indicator */
.typing-dots{display:flex;gap:4px;padding:10px 14px;}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--silver);
  animation:typingBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* Input area */
.chat-input-area{
  padding:12px 16px;background:var(--white);
  border-top:1px solid var(--chat-border);flex-shrink:0;
}
.chat-input-row{display:flex;gap:8px;align-items:center;}
.chat-input{
  flex:1;padding:9px 14px;border-radius:20px;
  border:1px solid var(--chat-border);background:var(--chat-bg);
  font-family:var(--sans);font-size:13px;color:var(--obsidian);outline:none;
  resize:none;max-height:80px;line-height:1.4;
  transition:border-color .2s;
}
.chat-input:focus{border-color:var(--gold);}
.chat-input::placeholder{color:var(--silver);}
.send-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--gold);color:var(--obsidian);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.send-btn:hover{background:var(--gold-light);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* Powered by */
.powered-by{
  text-align:center;font-size:9px;letter-spacing:1px;
  text-transform:uppercase;color:var(--silver);
  padding:6px 0 8px;background:var(--white);
  border-top:1px solid var(--chat-border);
}
.powered-by a{color:var(--gold);text-decoration:none;}

/* Error banner */
.error-banner{
  display:none;padding:8px 14px;background:#2a1212;border-bottom:1px solid #7a2020;
  font-size:11px;color:#e07070;font-family:monospace;word-break:break-all;
  flex-shrink:0;
}
.error-banner.visible{display:block;}
</style>
</head>
<body>

<div class="error-banner" id="error-banner"></div>
<div class="chat-header">
  <div class="chat-header-avatar">G</div>
  <div>
    <div class="chat-header-name">Gloria</div>
    <div class="chat-header-sub" id="biz-sub">AI Receptionist</div>
  </div>
  <button class="chat-header-close" onclick="closeWidget()" title="Close">✕</button>
</div>

<div class="chat-messages" id="chat-messages"></div>

<div class="chat-input-area">
  <div class="chat-input-row">
    <textarea class="chat-input" id="chat-input" placeholder="Message Gloria…" rows="1"></textarea>
    <button class="send-btn" id="send-btn" title="Send">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<div class="powered-by">Powered by <a href="https://slickbot.co.uk" target="_blank">Gloria</a></div>

<script>
const params = new URLSearchParams(location.search);
const widgetKey = params.get('key');
const refUrl    = params.get('ref') || '';

let sessionId = null;
let config    = {};
let sending   = false;

// ── Error banner ─────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('visible');
}
function clearError() {
  const el = document.getElementById('error-banner');
  el.textContent = '';
  el.classList.remove('visible');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!widgetKey) {
    showError('Configuration error — no widget key found.');
    addMsg('bot', 'Configuration error — no widget key found.');
    return;
  }

  try {
    const resp = await fetch(`/api/widget-config?key=${encodeURIComponent(widgetKey)}`);
    if (resp.ok) {
      config = await resp.json();
    } else {
      const err = await resp.json().catch(() => ({}));
      showError('Widget config error (HTTP ' + resp.status + '): ' + (err.error || 'Unknown error'));
    }
  } catch (e) {
    showError('Network error loading config: ' + e.message);
  }

  const biz = config.bizName || '';
  if (biz) document.getElementById('biz-sub').textContent = biz;

  const tod = timeOfDay();
  const greeting = config.greeting || (biz
    ? `${tod}. I'm Gloria — I'm the receptionist here at ${biz}. How may I assist you today?`
    : `${tod}. I'm Gloria, your AI receptionist. How can I help?`);

  addMsg('bot', greeting);
  document.getElementById('chat-input').focus();
}

// ── Messaging ─────────────────────────────────────────────────────────────────
async function send() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || sending) return;

  input.value = '';
  input.style.height = '';
  addMsg('user', text);
  sending = true;
  document.getElementById('send-btn').disabled = true;

  const typingId = showTyping();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, message: text, widgetKey }),
    });
    const data = await resp.json();
    if (data.sessionId) sessionId = data.sessionId;
    removeTyping(typingId);
    if (!resp.ok) {
      const errMsg = data.error || ('HTTP ' + resp.status);
      showError('Chat blocked: ' + errMsg);
      addMsg('bot', 'Sorry, your message was blocked: ' + errMsg);
    } else {
      clearError();
      if (data.reply) addMsg('bot', data.reply);
    }
  } catch (e) {
    removeTyping(typingId);
    showError('Connection error: ' + e.message);
    addMsg('bot', 'Sorry, I had a connection issue. Please try again.');
  }

  sending = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const wrap = document.getElementById('chat-messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'bot') {
    div.innerHTML = `
      <div class="msg-avatar">G</div>
      <div class="msg-bubble">${esc(text)}</div>`;
  } else {
    div.innerHTML = `<div class="msg-bubble">${esc(text)}</div>`;
  }

  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chat-messages');
  const id   = 'typing-' + Date.now();
  const div  = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">G</div>
    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function closeWidget() {
  if (window.parent !== window) window.parent.postMessage('gloria:close', '*');
}

function timeOfDay() {
  const h = new Date().getHours();
  if (h < 12) return 'Morning';
  if (h < 17) return 'Afternoon';
  return 'Evening';
}

function esc(t) {
  return String(t || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('send-btn').onclick = send;
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = '';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

init();
</script>
</body>
</html>
